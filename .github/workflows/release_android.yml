name: release_android

on:
  release:
    types: [ published ]

# Re-publishing the same tag recreates the release (new id), which would leave
# any in-flight run pointing at a deleted release id and fail with 404. Cancel
# the stale run so only the newest publish for a given tag proceeds.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  release_android:
    strategy:
      matrix:
        platform: [ ubuntu-latest ]
        go-version: [ '1.21' ]
    name: Release
    runs-on: ${{ matrix.platform }}
    steps:

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          bash build.sh release android

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/compress/*
